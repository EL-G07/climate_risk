services:
  - type: web
    name: climate-risk-dashboard
    env: python
    buildCommand: |
      pip install -r requirements.txt
    startCommand: voila prediction.ipynb --port=$PORT --no-browser --VoilaConfiguration.ip=0.0.0.0
    plan: free
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18